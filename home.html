<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince AlgoTech - Multi-Pair Filter System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(145deg, #111827, #1f2937);
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #3b82f6;
        }
        p.subtitle {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .features {
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #3b82f6;
        }
        .feature-item {
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .feature-item:last-child {
            margin-bottom: 0;
        }
        .feature-item i {
            color: #10b981;
            margin-right: 10px;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            width: 100%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            transform: translateY(-2px);
        }
        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">PA</div>
        <h1>Prince AlgoTech</h1>
        <p class="subtitle">শতভাগ গাণিতিক ডিসিপ্লিন, কোনো ইমোশন নয়!</p>
        
        <div class="features">
            <div class="feature-item"><i>✓</i> Gold, BTC & Crude Oil স্বয়ংক্রিয় ফিল্টার সিস্টেম</div>
            <div class="feature-item"><i>✓</i> ১:২ রিস্ক-রিওয়ার্ড রেশিও প্রোটেকশন ($1:2$ RR)</div>
            <div class="feature-item"><i>✓</i> ইন-বিল্ট বাধ্যতামূলক স্টপ-লস প্রোটেকশন (SL)</div>
        </div>

        <a href="https://www.facebook.com/PrinceAlgoTech.EA" class="btn" target="_blank">২৪ ঘণ্টা ফ্রি ট্রায়াল নিন</a>
        
        <p class="footer-text">© 2026 Prince AlgoTech. All Rights Reserved.</p>
    </div>

</body>
</html>
