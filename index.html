<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Multi-Pair Technical Filter for EA</title>
    <style>
        body { background-color: #f4f4f4; margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #222; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .widget-block { margin-bottom: 25px; padding: 10px; border-bottom: 1px dashed #eee; }
        .widget-block:last-child { border-bottom: none; margin-bottom: 0; }
        .pair-title { font-size: 16px; font-weight: bold; color: #0056b3; margin-bottom: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Pair Live Technical Filter (1H)</h2>
    
    <div class="widget-block">
        <div class="pair-title">1. Gold Spot / US Dollar (XAU/USD)</div>
        <iframe src="https://ssltswidget.investing.com/index.php?rows=1&currencies=8830&timeframe=3600&lang=1&title=&pairs_id=8830" 
                width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">2. Euro / US Dollar (EUR/USD)</div>
        <iframe src="https://ssltswidget.investing.com/index.php?rows=1&currencies=1&timeframe=3600&lang=1&title=&pairs_id=1" 
                width="100%" height="140" frameborder="0" scrolling="no"></iframe> 
    </div>

    <div class="widget-block">
        <div class="pair-title">3. British Pound / US Dollar (GBP/USD)</div>
        <iframe src="https://ssltswidget.investing.com/index.php?rows=1&currencies=2&timeframe=3600&lang=1&title=&pairs_id=2" 
                width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">4. Bitcoin / US Dollar (BTC/USD)</div>
        <iframe src="https://ssltswidget.investing.com/index.php?rows=1&currencies=945629&timeframe=3600&lang=1&title=&pairs_id=945629" 
                width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">5. WTI Crude Oil (Light Sweet Crude)</div>
        <iframe src="https://ssltswidget.investing.com/index.php?rows=1&currencies=8849&timeframe=3600&lang=1&title=&pairs_id=8849" 
                width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

</div>

</body>
</html>
