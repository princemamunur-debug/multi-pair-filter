<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Algo Technical Filter v3.0</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 480px; background: #1e293b; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { text-align: center; color: #38bdf8; font-size: 18px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .pair-card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .pair-info { display: flex; flex-direction: column; }
        .pair-name { font-weight: bold; color: #94a3b8; font-size: 12px; }
        .pair-symbol { font-size: 15px; color: #f8fafc; font-weight: bold; margin-top: 2px; }
        .signal-badge { font-size: 14px; font-weight: bold; padding: 8px 16px; border-radius: 6px; min-width: 90px; text-align: center; text-transform: uppercase; }
        .strong-buy { background-color: #10b981; color: #fff; box-shadow: 0 0 10px rgba(16,185,129,0.4); }
        .buy { background-color: #059669; color: #fff; opacity: 0.9; }
        .strong-sell { background-color: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239,68,68,0.4); }
        .sell { background-color: #dc2626; color: #fff; opacity: 0.9; }
        .license-box { margin-top: 25px; background: #334155; padding: 12px; border-radius: 6px; font-size: 11px; color: #cbd5e1; border-left: 4px solid #38bdf8; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Prince Algo Filter Engine</h2>
    
    <div class="pair-card">
        <div class="pair-info">
            <span class="pair-name">1. COMMODITY</span>
            <span class="pair-symbol">XAU/USD (GOLD)</span>
        </div>
        <div class="signal-badge strong-buy">Strong Buy</div>
    </div>

    <div class="pair-card">
        <div class="pair-info">
            <span class="pair-name">2. FOREX PAIR</span>
            <span class="pair-symbol">EUR/USD</span>
        </div>
        <div class="signal-badge buy">Buy</div>
    </div>

    <div class="pair-card">
        <div class="pair-name">3. FOREX PAIR</span>
        <span class="pair-symbol">GBP/USD</span>
        </div>
        <div class="signal-badge strong-buy">Strong Buy</div>
    </div>

    <div class="pair-card">
        <div class="pair-info">
            <span class="pair-name">4. CRYPTO</span>
            <span class="pair-symbol">BTC/USD (BITCOIN)</span>
        </div>
        <div class="signal-badge buy">Buy</div>
    </div>

    <div class="pair-card">
        <div class="pair-name">5. ENERGY</span>
        <span class="pair-symbol">WTI CRUDE OIL</span>
        </div>
        <div class="signal-badge strong-sell">Strong Sell</div>
    </div>

    <div class="license-box">
        🔒 <strong>AUTHORIZED TRADING ACCOUNTS:</strong><br>
        ACC_START, 49487665, 267888832, 7816561, ACC_END
    </div>
</div>

</body>
</html>
