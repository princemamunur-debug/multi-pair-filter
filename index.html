<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Multi-Pair Technical Filter & License Control</title>
    <style>
        body { background-color: #f4f4f4; margin: 0; padding: 20px; font-family: Arial, sans-serif; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #222; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .widget-block { margin-bottom: 25px; padding: 10px; border-bottom: 1px dashed #eee; }
        .widget-block:last-child { border-bottom: none; margin-bottom: 0; }
        .pair-title { font-size: 16px; font-weight: bold; color: #0056b3; margin-bottom: 8px; text-transform: uppercase; }
        .license-box { background: #e9ecef; padding: 15px; border-radius: 5px; margin-top: 20px; border-left: 5px solid #28a745; }
        .account-list { font-family: monospace; font-size: 14px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Pair Live Technical Filter (5 Hours)</h2>
    
    <div class="widget-block">
        <div class="pair-title">1. Gold Spot / US Dollar (XAU/USD)</div>
        <iframe src="https://technical-summary.investing.com/index.php?rows=1&currencies=8830&timeframe=18000&lang=1&title=&pairs_id=8830" width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">2. Euro / US Dollar (EUR/USD)</div>
        <iframe src="https://technical-summary.investing.com/index.php?rows=1&currencies=1&timeframe=18000&lang=1&title=&pairs_id=1" width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">3. British Pound / US Dollar (GBP/USD)</div>
        <iframe src="https://technical-summary.investing.com/index.php?rows=1&currencies=2&timeframe=18000&lang=1&title=&pairs_id=2" width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">4. Bitcoin / US Dollar (BTC/USD)</div>
        <iframe src="https://technical-summary.investing.com/index.php?rows=1&currencies=945629&timeframe=18000&lang=1&title=&pairs_id=945629" width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="widget-block">
        <div class="pair-title">5. WTI Crude Oil (Light Sweet Crude)</div>
        <iframe src="https://technical-summary.investing.com/index.php?rows=1&currencies=8849&timeframe=18000&lang=1&title=&pairs_id=8849" width="100%" height="140" frameborder="0" scrolling="no"></iframe>
    </div>

    <div class="license-box">
        <div class="pair-title" style="color: #28a745;">🔐 ALLOWED TRADING ACCOUNTS:</div>
        <div class="account-list">
            ACC_START, 49487665, 267888832, 7816561, ACC_END
        </div>
    </div>

</div>

</body>
</html>
